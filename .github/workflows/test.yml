name: creating Flask applications
on:
  push: 
    branches:
      - main 
      - feature/* 
    paths:
     - app/**
     - .github/workflows/** 
  pull_request:
       branches:
          - main 
       types:
        - opened 
        - synchronize 
        - ready_for_review 

env:
  APPLICATION_NAME: flask-app
  DOCKER_USERNAME: gundaprashanth

  

jobs:
  checkoutrepository:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'push' && startsWith(github.ref_name, 'feature/')) || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main' && !contains(github.event.pull_request.title, 'WIP')) }}

    steps:
             - name: checkoutrepository 
               uses: actions/checkout@v6 
              
             - name: Generate Dynamic Image Tag 
               run: |
                  echo "IMAGE_TAG=v${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> $GITHUB_ENV 
             
             - name: Display Build Information
               run: | 
                 echo "Application: $APPLICATION_NAME"" 
                 echo "Repository: $GITHUB_REPOSITORY"
                 echo "Actor: $GITHUB_ACTOR"
                 echo "Branch: $GITHUB_REF_NAME"
                 echo "Image Tag: $IMAGE_TAG" 
              
             - name: Login to DOckerHub 
               uses: docker/login-action@v3 
               with: 
                   username: ${{ env. DOCKER_USERNAME }}
                   password: ${{ secrets.DOCKERHUB_TOKEN }}

             - name: Build Docker Image 
               uses: docker/build push action@v7 
               with:
                   context: ./app 
                   push: false 
                   tags: ${{ env.DOCKER_USERNAME }}/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}

             - name: Run Container 
               run: |
                 docker run -d \
                 -p 5000:5000 \
                  --name flask-container\
                  $DOCKER_USERNAME/$APPLICATION_NAME:$IMAGE_TAG 
             
             - name: Smoke Test Application 
               run: | 
                  sleep 5 
                  curl --fail http://localhost:5000 
                  curl --fail http://localhost:5000/health  

             - name: Push Docker Image TO DockerHub
               if: ${{ success () }}
               run: |
                  docker push $DOCKER_USERNAME/$APPLICATION_NAME:$IMAGE_TAG 
             
             
             - name: Collect Container Logs
               if: ${{ failure() }}
               run: |
                  docker logs flask-container  
              

             - name: CleanUp Containers 
               if: ${{ always() }}
               run: |
                  docker rm -f flask-container || true 


